replicaCount: 3

image:
  repository: 123456789012.dkr.ecr.us-east-1.amazonaws.com/orders-api
  tag: v1.4.0
  pullPolicy: IfNotPresent

serviceAccount:
  name: orders-api
  # IRSA role ARN that grants this workload its scoped AWS permissions.
  roleArn: ""

containerPort: 8080

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    # Memory limit equals request for a stable allocation. No CPU limit on purpose.
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70

pdb:
  minAvailable: 2

ingress:
  enabled: true
  host: api.example.com
  certificateArn: "arn:aws:acm:us-east-1:123456789012:certificate/REPLACE-ME"
