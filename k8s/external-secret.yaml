# External Secrets Operator pulling from AWS Secrets Manager via IRSA (Chapter 13).
#
# The service account below is what the SecretStore authenticates as. Its IRSA
# role is created in Terraform (services/eks/platform.tf). Set the role-arn
# annotation from:  terraform -chdir=services/eks output external_secrets_role_arn
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: production
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/learning-prod-external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: production
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-